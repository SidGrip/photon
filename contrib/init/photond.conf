description "Photon Core Daemon"

start on runlevel [2345]
stop on starting rc RUNLEVEL=[016]

env PHOTOND_BIN="/usr/bin/photond"
env PHOTOND_USER="photon"
env PHOTOND_GROUP="photon"
env PHOTOND_PIDDIR="/var/run/photond"
# upstart can't handle variables constructed with other variables
env PHOTOND_PIDFILE="/var/run/photond/photond.pid"
env PHOTOND_CONFIGFILE="/etc/photon/photon.conf"
env PHOTOND_DATADIR="/var/lib/photond"

expect fork

respawn
respawn limit 5 120
kill timeout 600

pre-start script
    # this will catch non-existent config files
    # photond will check and exit with this very warning, but it can do so
    # long after forking, leaving upstart to think everything started fine.
    # since this is a commonly encountered case on install, just check and
    # warn here.
    if ! grep -qs '^rpcpassword=' "$PHOTOND_CONFIGFILE" ; then
        echo "ERROR: You must set a secure rpcpassword to run photond."
        echo "The setting must appear in $PHOTOND_CONFIGFILE"
        echo
        echo "This password is security critical to securing wallets "
        echo "and must not be the same as the rpcuser setting."
        echo "You can generate a suitable random password using the following "
        echo "command from the shell:"
        echo
        echo "bash -c 'tr -dc a-zA-Z0-9 < /dev/urandom | head -c32 && echo'"
        echo
        echo "It is recommended that you also set alertnotify so you are "
        echo "notified of problems:"
        echo
        echo "ie: alertnotify=echo %%s | mail -s \"Photon Alert\"" \
            "admin@foo.com"
        echo
        exit 1
    fi

    mkdir -p "$PHOTOND_PIDDIR"
    chmod 0755 "$PHOTOND_PIDDIR"
    chown $PHOTOND_USER:$PHOTOND_GROUP "$PHOTOND_PIDDIR"
    chown $PHOTOND_USER:$PHOTOND_GROUP "$PHOTOND_CONFIGFILE"
    chmod 0660 "$PHOTOND_CONFIGFILE"
end script

exec start-stop-daemon \
    --start \
    --pidfile "$PHOTOND_PIDFILE" \
    --chuid $PHOTOND_USER:$PHOTOND_GROUP \
    --exec "$PHOTOND_BIN" \
    -- \
    -pid="$PHOTOND_PIDFILE" \
    -conf="$PHOTOND_CONFIGFILE" \
    -datadir="$PHOTOND_DATADIR" \
    -disablewallet \
    -daemon
